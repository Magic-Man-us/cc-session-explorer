name: Publish

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    # gitleaks-action doesn't support the `release` event; the commit was already scanned
    # when it landed on main via push, so skip re-scanning it here.
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks scans full history, not just the checked-out commit
      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
      - run: uv sync --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright

  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: ${{ matrix.python-version }}

      - run: uv sync --all-groups

      - name: Run tests
        run: |
          uv run pytest \
            --junitxml=junit.xml \
            --cov=cc_session_explorer \
            --cov-report=xml

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Magic-Man-us/cc-session-explorer
          files: coverage.xml
          flags: python-${{ matrix.python-version }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: Magic-Man-us/cc-session-explorer
          files: junit.xml
          report_type: test_results
          flags: python-${{ matrix.python-version }}

  package:
    needs: [secrets-scan, lint, test]
    # secrets-scan is skipped (not successful) on release events by design, so the
    # default needs-check would cascade-skip package/publish on every release.
    if: |
      always() &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.secrets-scan.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv build

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: package
    # implicit success() also checks package's transitive ancestors (secrets-scan,
    # which is skipped-by-design on release events), not just this direct need --
    # so it must be gated explicitly on package's own result instead.
    if: |
      always() &&
      needs.package.result == 'success' &&
      github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
